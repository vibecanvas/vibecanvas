name: Publish Release

on:
  push:
    branches:
      - 'release/v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_notes: ${{ steps.version.outputs.release_notes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Validate release branch, version, tag, and changelog
        id: version
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          ROOT_VERSION=$(bun -e 'const pkg = await Bun.file("package.json").json(); process.stdout.write(pkg.version)')
          APP_VERSION=$(bun -e 'const pkg = await Bun.file("apps/vibecanvas/package.json").json(); process.stdout.write(pkg.version)')

          if [ -z "$ROOT_VERSION" ]; then
            echo "Failed to read version from package.json" >&2
            exit 1
          fi

          if [ -z "$APP_VERSION" ]; then
            echo "Failed to read version from apps/vibecanvas/package.json" >&2
            exit 1
          fi

          if [ "$ROOT_VERSION" != "$APP_VERSION" ]; then
            echo "Version mismatch: package.json is $ROOT_VERSION but apps/vibecanvas/package.json is $APP_VERSION. Align both versions before publishing." >&2
            exit 1
          fi

          if [[ "$BRANCH_NAME" != release/v* ]]; then
            echo "Invalid release branch: '$BRANCH_NAME'. Expected format: release/v$ROOT_VERSION" >&2
            exit 1
          fi

          BRANCH_VERSION="${BRANCH_NAME#release/v}"
          if [ "$BRANCH_VERSION" != "$ROOT_VERSION" ]; then
            echo "Release branch version mismatch: branch is '$BRANCH_NAME' but package.json version is '$ROOT_VERSION'. Expected branch: release/v$ROOT_VERSION" >&2
            exit 1
          fi

          TAG="v$ROOT_VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1 || git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Refusing to publish: git tag '$TAG' already exists." >&2
            exit 1
          fi

          NOTES_FILE="$RUNNER_TEMP/release-notes.md"
          VERSION="$ROOT_VERSION" NOTES_FILE="$NOTES_FILE" bun run - <<'EOF'
          const version = process.env.VERSION
          const notesFile = process.env.NOTES_FILE

          if (!version || !notesFile) {
            throw new Error("Missing VERSION or NOTES_FILE environment variable")
          }

          const text = await Bun.file("CHANGELOG.md").text()
          const lines = text.split(/\r?\n/)
          const heading = `## ${version}`
          const start = lines.findIndex((line) => line.trim() === heading)

          if (start === -1) {
            console.error(`Missing release notes in CHANGELOG.md for version ${version}. Expected a section headed exactly: ${heading}`)
            process.exit(1)
          }

          let end = lines.length
          for (let index = start + 1; index < lines.length; index += 1) {
            if (/^##\s+/.test(lines[index])) {
              end = index
              break
            }
          }

          const section = lines.slice(start + 1, end).join("\n").trim()
          if (!section) {
            console.error(`CHANGELOG.md section ${heading} exists but is empty.`)
            process.exit(1)
          }

          await Bun.write(notesFile, `${section}\n`)
          EOF

          echo "version=$ROOT_VERSION" >> "$GITHUB_OUTPUT"
          {
            echo "release_notes<<EOF"
            cat "$NOTES_FILE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Validated release version $ROOT_VERSION"

  test:
    runs-on: ubuntu-latest
    needs:
      - check-version
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

  build-release-artifacts:
    runs-on: ubuntu-latest
    needs:
      - test
      - check-version
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release artifacts
        run: bun run scripts/build.ts

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist
          if-no-files-found: error
          retention-days: 7

  test-linux-binary:
    runs-on: ubuntu-latest
    needs:
      - build-release-artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist

      - name: Test Linux x64 binary
        run: |
          chmod +x dist/vibecanvas-linux-x64/bin/vibecanvas
          bun run scripts/test-binary.ts --binary dist/vibecanvas-linux-x64/bin/vibecanvas --port 3339

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - test
      - check-version
      - build-release-artifacts
      - test-linux-binary
    environment:
      name: production
    env:
      GH_TOKEN: ${{ github.token }}
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Verify Node and npm versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist

      - name: Publish npm packages
        run: bun run scripts/publish-npm.ts

      - name: Create and push git tag
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          set -euo pipefail
          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1 || git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Refusing to push tag: '$TAG' already exists." >&2
            exit 1
          fi
          git tag "$TAG"
          git push origin "$TAG"

      - name: Publish GitHub release
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          RELEASE_NOTES: ${{ needs.check-version.outputs.release_notes }}
        run: |
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"
          printf '%s\n' "$RELEASE_NOTES" > "$NOTES_FILE"
          bun run scripts/release.ts --tag "v$VERSION" --notes-file "$NOTES_FILE" --fail-if-exists

      - name: Print release summary
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: echo "Published release v$VERSION"
